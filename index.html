<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SwiftConverterHub - Hızlı Dosya Dönüştürücü</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .container { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; }
        input[type="file"] { margin: 20px 0; }
        button { padding: 12px 25px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SwiftConverterHub</h1>
        <p>Dosyanızı yükleyin ve anında dönüştürün!</p>
        <input type="file" id="fileInput">
        <br>
        <button onclick="processFile()">Şimdi Dönüştür</button>
        <div id="status"></div>
    </div>

    <script>
        function processFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            
            if (fileInput.files.length === 0) {
                alert("Lütfen önce bir dosya seçin!");
                return;
            }
            
            status.innerText = "İşleniyor... Lütfen bekleyin!";
            setTimeout(() => {
                status.innerText = "Başarılı! Dosyanız hazır (Örnek Demo).";
            }, 2000);
        }
    </script>
</body>
</html>
