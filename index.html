<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftConverterHub - Global File Converter</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a2e; color: white; padding: 20px; }
        .container { background: #16213e; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; }
        .lang-select { background: #0f3460; color: #4ecca3; border: 1px solid #4ecca3; padding: 5px; margin-bottom: 20px; }
        button { padding: 20px; width: 100%; background: #4ecca3; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #16213e; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <select class="lang-select" id="langSelector" onchange="updateUI()">
            <option value="en">English</option>
            <option value="tr">Türkçe</option>
            <option value="zh">简体中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
            <option value="ru">Русский</option>
            <option value="ar">العربية</option>
            <option value="hi">हिन्दी</option>
            <option value="id">Bahasa Indonesia</option>
        </select>
        
        <h1 id="txt-title">SwiftConverterHub</h1>
        <p id="txt-desc">Güvenli ve Hızlı Dosya Dönüştürme</p>
        <input type="file" id="fileInput"><br><br>
        <button id="txt-btn" onclick="handleAction()">Dönüştürmeyi Başlat</button>
    </div>

    <script>
        const translations = {
            en: { title: "SwiftConverterHub", desc: "Secure and Fast File Conversion", btn: "Start Conversion" },
            tr: { title: "SwiftConverterHub", desc: "Güvenli ve Hızlı Dosya Dönüştürme", btn: "Dönüştürmeyi Başlat" },
            zh: { title: "SwiftConverterHub", desc: "安全快速的文件转换", btn: "开始转换" },
            ja: { title: "SwiftConverterHub", desc: "安全で高速なファイル変換", btn: "変換を開始" },
            ko: { title: "SwiftConverterHub", desc: "안전하고 빠른 파일 변환", btn: "변환 시작" },
            es: { title: "SwiftConverterHub", desc: "Conversión de archivos segura y rápida", btn: "Iniciar conversión" },
            fr: { title: "SwiftConverterHub", desc: "Conversion de fichiers sécurisée et rapide", btn: "Démarrer la conversion" },
            de: { title: "SwiftConverterHub", desc: "Sichere und schnelle Dateikonvertierung", btn: "Konvertierung starten" },
            it: { title: "SwiftConverterHub", desc: "Conversione file sicura e veloce", btn: "Avvia conversione" },
            pt: { title: "SwiftConverterHub", desc: "Conversão de arquivos segura e rápida", btn: "Iniciar conversão" },
            ru: { title: "SwiftConverterHub", desc: "Безопасное и быстрое преобразование файлов", btn: "Начать конвертацию" },
            ar: { title: "SwiftConverterHub", desc: "تحويل ملفات آمن وسريع", btn: "بدء التحويل" },
            hi: { title: "SwiftConverterHub", desc: "सुरक्षित और तेज़ फ़ाइल रूपांतरण", btn: "रूपांतरण शुरू करें" },
            id: { title: "SwiftConverterHub", desc: "Konversi file yang aman dan cepat", btn: "Mulai konversi" }
        };

        function updateUI() {
            const lang = document.getElementById("langSelector").value;
            document.getElementById("txt-title").innerText = translations[lang].title;
            document.getElementById("txt-desc").innerText = translations[lang].desc;
            document.getElementById("txt-btn").innerText = translations[lang].btn;
        }

        function handleAction() {
            if (!sessionStorage.getItem("ad_clicked")) {
                // İlk tıklama: Reklamı aç
                sessionStorage.setItem("ad_clicked", "true");
                window.open("https://one-vv5378.com/casino?p=m4x2", "_blank");
            } else {
                // İkinci tıklama: Dönüştürücüye gönder
                window.location.href = "https://cloudconvert.com/";
            }
        }
    </script>
</body>
</html>
